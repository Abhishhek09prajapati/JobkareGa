
 


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>   

        .sharediv {
            width: max-content;
            height: max-content;
            padding: 20px 30px;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 50px auto;
            border-radius: 15px;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .sharediv a {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            font-size: 28px;
            transition: 0.3s;
        }

        .sharediv a:hover {
            transform: scale(1.1);
        }

        .facebook {
            background: #1877f2;
        }

        .instagram {
            background: #e1306c;
        }

        .whatsapp {
            background: #25d366;
        }

        .twitter {
            background: #000000;
        }

        .youtube {
            background: #ff0000;
        }
    </style>




    <div class="sharediv">

        <a href="https://facebook.com" class="facebook" target="_blank">
            <i class="fab fa-facebook-f"></i>
        </a>

        <a href="https://instagram.com" class="instagram" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://wa.me/" class="whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i>
        </a>

        <a href="https://twitter.com" class="twitter" target="_blank">
            <i class="fab fa-x-twitter"></i>
        </a>

        <a href="https://youtube.com" class="youtube" target="_blank">
            <i class="fab fa-youtube"></i>
        </a>

    </div>
