<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepu Medical Whatsapp</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="mobileview">
        <div class="navbaar">Deepu Medical Whatsapp Message</div>
        <div id="whatsappnumber" class="messsagebox"></div>
        <div id="Barcodebox" class="Barcodebox">
            <div>

                <div id="barcodeVew" class="bardcodeVew">
                </div>
            </div>
        </div>
        <div id="templatebox" class="templatebox">
            <label for="messageInput">Enter the Message</label>
            <div>
                <textarea id="messageInput" rows="4" cols="50" placeholder="Type your message here..."></textarea>
                <button id="copyBtn">Copy the textarea message</button>
            </div>
        </div>

        <div class="bottombar">
            <div class="messagebtn">Message</div>
            <div class="barcodebtn">Barcode</div>
            <div class="templatebtn">Template</div>
        </div>
        <div class="footers">Thansk For Visting</div>
    </div>
</body>
<script src="index.js"></script>

</html>
