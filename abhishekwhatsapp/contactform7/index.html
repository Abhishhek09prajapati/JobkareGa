<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration Form</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="loading" class="loading">
        Data are sending , Please wait ...
    </div>

    <div id="maindiv">
        <div class="form-header">
            <h1>Abhishek Enterprises</h1>
            <p>Friends Registration Form</p>
        </div>

        <form id="contactForm">
            <div class="input-group">
                <label for="name">Name</label>
                <div class="input-wrapper">
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
            </div>
            <div class="input-group">
                <label for="email">Email <span class="optional">(Optional)</span></label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" placeholder="name@example.com">
                </div>
            </div>

            <div class="input-group">
                <label for="mobile">Mobile Number</label>
                <div class="input-wrapper prefix">
                    <span class="country-code">+91</span>
                    <input type="tel" id="mobile" name="mobile" placeholder="Enter 10-digit number" pattern="[0-9]{10}"
                        required>
                </div>
            </div>

            <div class="input-group">
                <label for="referral">Referral By <span class="optional">(Optional)</span></label>
                <div class="input-wrapper">
                    <input type="text" id="referral" name="referral" placeholder="Referral person's name">
                </div>
            </div>

            <div class="input-group">
                <label for="address">Address</label>
                <div class="input-wrapper">
                    <textarea id="address" name="address" rows="3" placeholder="Enter complete address"
                        required></textarea>
                </div>
            </div>
            <div class="input-group">
                <label for="mobile">Status</label>
                <div class="input-wrapper prefix">

                    <input type="text" id="ocupation" name="ocupation" placeholder="Job/Student/Business"
                        required>
                </div>
            </div>

            <button type="submit" id="submited">
                <span>Submit Details</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>

        </form>
    </div>

    

    <script src="index.js"></script>

</body>

</html>
