<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Quick Recharge</title>
    <link rel="stylesheet" href="style.css">
    <!-- Adding a modern font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="admin-container">
        <div class="form-card">
            <h2>Add Points</h2>
            <p class="subtitle">Enter customer details to initiate transaction</p>

            <div class="input-group">
                <label for="mobileNumber">Agent Number</label>
                <input type="number" id="mobileNumber" placeholder="e.g. 9876543210">
                <!-- Dropdown list for matching numbers (hidden by default) -->
                <div class="numberList" id="numberList"></div>
            </div>
            
            <div class="input-group">
                <label for="enterAmount">Recharge Amount (₹)</label>
                <input type="number" id="enterAmount" placeholder="0.00">
            </div>
            
            <button class="submit-btn">Process Transaction</button>
        </div>
    </div>

</body>
<script src="script.js"></script>
</html>
