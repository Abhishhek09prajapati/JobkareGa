<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #f0f8ff, #dbeafe);
        min-height: 100vh;
        padding: 20px;
    }

    .maindiv {
        max-width: 1200px;
        margin: auto;
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    .maindiv a {
        text-decoration: none;
        color: black;
    }

    .lactogen {
        width: 250px;
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.15);
        transition: 0.3s;
        text-align: center;
        padding-bottom: 15px;
    }

    .lactogen:hover {
        transform: translateY(-8px);
        box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.25);
    }

    .lactogen img {
        width: 100%;
        height: 200px;
        object-fit: contain;
        background: #f8fafc;
        padding: 10px;
    }

    .lactogen h3 {
        margin-top: 10px;
        font-size: 20px;
        color: #1e3a8a;
    }

    .lactogen p {
        color: #555;
        font-size: 14px;
        padding: 5px 10px;
    }

    /* Tablet */

</style>

<body>
    <h1 style="text-align:center;margin-bottom:25px;color:#1e3a8a;">
        Aminabad Wholesale Shops
    </h1>

    <div class="maindiv">

        <a href="./WholeSalesShop/lactogen/index.html">
            <div class="lactogen">
                <img src="./WholeSalesShop/lactogen/images/l1.png" alt="">
                <h3>Nestle Products</h3>
                <p>Lactogen, Cerelac, Nestogen & More</p>
            </div>
        </a>

        <a href="./WholeSalesShop/balGopalShop/index.html">
            <div class="lactogen">
                <img src="./images/balgopal.png" alt="">
                <h3>Bal Gopal</h3>
                <p>Baby Care & Daily Essentials</p>
            </div>
        </a>

        <a href="./WholeSalesShop/Surgicalitmes/index.html">
            <div class="lactogen">
                <img src="./images/surgical.png" alt="">
                <h3>Surgical Items</h3>
                <p>Medical & Surgical Products</p>
            </div>
        </a>

    </div>
</body>

</html>
